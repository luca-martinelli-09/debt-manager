<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cardBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" /> <!-- Indigo 500 -->
      <stop offset="100%" stop-color="#4338ca" /> <!-- Indigo 700 -->
    </linearGradient>
    
    <linearGradient id="cardFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" /> <!-- Emerald 500 -->
      <stop offset="100%" stop-color="#047857" /> <!-- Emerald 700 -->
    </linearGradient>

    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" /> <!-- Yellow 300 -->
      <stop offset="100%" stop-color="#ea580c" /> <!-- Orange 600 -->
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadowLarge" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-2" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.25" />
    </filter>

    <filter id="shadowSparkle" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#ea580c" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Back Card (Indigo) -->
  <g transform="translate(128, 128) rotate(-12) translate(-128, -128)">
    <!-- Card Body -->
    <rect x="56" y="56" width="144" height="96" rx="16" fill="url(#cardBack)" filter="url(#shadowLarge)" />
    <!-- Chip -->
    <rect x="76" y="76" width="24" height="16" rx="4" fill="#ffffff" opacity="0.2" />
    <!-- Magnetic Strip -->
    <rect x="56" y="112" width="144" height="16" fill="#000000" opacity="0.2" />
  </g>

  <!-- Front Card (Emerald) -->
  <g transform="translate(128, 128) rotate(8) translate(-128, -128)">
    <!-- Card Body -->
    <rect x="40" y="104" width="168" height="104" rx="16" fill="url(#cardFront)" filter="url(#shadowLarge)" />
    <!-- Chip -->
    <rect x="64" y="124" width="28" height="20" rx="4" fill="#ffffff" opacity="0.6" />
    <!-- Minimalist logo on card (Mastercard/Visa style overlapping circles) -->
    <circle cx="180" cy="180" r="14" fill="#ffffff" opacity="0.3" />
    <circle cx="164" cy="180" r="14" fill="#ffffff" opacity="0.3" />
    <!-- Text lines (simulating card holder and numbers) -->
    <rect x="64" y="160" width="72" height="6" rx="3" fill="#ffffff" opacity="0.4" />
    <rect x="64" y="174" width="48" height="6" rx="3" fill="#ffffff" opacity="0.4" />
  </g>

  <!-- AI Sparkle (Top Right) representing Gemini AI -->
  <g transform="translate(176, 24) scale(1.6)" filter="url(#shadowSparkle)">
    <path d="M 16 0 C 16 8, 24 16, 32 16 C 24 16, 16 24, 16 32 C 16 24, 8 16, 0 16 C 8 16, 16 8, 16 0 Z" fill="url(#sparkle)" />
  </g>
  
  <!-- Mini AI Sparkle (Bottom Left) -->
  <g transform="translate(24, 180) scale(0.8)" filter="url(#shadowSparkle)">
    <path d="M 16 0 C 16 8, 24 16, 32 16 C 24 16, 16 24, 16 32 C 16 24, 8 16, 0 16 C 8 16, 16 8, 16 0 Z" fill="url(#sparkle)" />
  </g>
</svg>